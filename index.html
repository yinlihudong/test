<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时钟显示应用</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="clock-app" aria-live="polite">
      <p class="badge">Local Time</p>
      <h1 id="time" class="time" aria-label="当前时间">00:00:00</h1>
      <p id="date" class="date" aria-label="当前日期">2026年03月04日 星期三</p>

      <button id="formatToggle" class="toggle-btn" type="button" aria-pressed="false">
        切换到 12 小时制
      </button>
    </main>

    <script src="app.js"></script>
  </body>
</html>
